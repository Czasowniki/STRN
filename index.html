<script>
        const getEl = (id) => document.getElementById(id);
        const mv = getEl('clock-model');

        // Funkcja wymuszająca start wszystkich animacji
        mv.addEventListener('load', () => {
            const names = mv.availableAnimations;
            if (names && names.length > 0) {
                names.forEach(anim => {
                    // To uruchomi każdą znalezioną ścieżkę
                    mv.animationName = anim; 
                    mv.play();
                });
                // Jeśli model ma wiele ścieżek, poniższa linia próbuje je zsynchronizować
                mv.animationName = names[0]; 
            }
        });

        const CONFIG = {
            mobileOrbit: "180deg 75deg 110%",
            desktopOrbit: "180deg 75deg 120%",
            mobileTarget: "0m 0.18m 0m",
            desktopTarget: "0m 0.15m 0m"
        };

        getEl('reset-view').onclick = () => {
            const isMob = window.innerWidth < 768;
            mv.cameraOrbit = isMob ? CONFIG.mobileOrbit : CONFIG.desktopOrbit;
            mv.cameraTarget = isMob ? CONFIG.mobileTarget : CONFIG.desktopTarget;
        };

        const togglePanel = (showId, hideId) => {
            getEl(hideId).classList.remove('visible');
            getEl(showId).classList.toggle('visible');
        };

        getEl('toggle-strn').onclick = () => togglePanel('panel-strn', 'panel-czasowniki');
        getEl('toggle-czasowniki').onclick = () => togglePanel('panel-czasowniki', 'panel-strn');

        getEl('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            mv.exposure = isDark ? "1.6" : "2.8";
        };

        const pauseBtn = getEl('pause-toggle');
        pauseBtn.onclick = () => {
            if (pauseBtn.dataset.paused !== "true") {
                mv.pause();
                getEl('icon-pause').style.display = 'none';
                getEl('icon-play').style.display = 'block';
                pauseBtn.dataset.paused = "true";
            } else {
                mv.play();
                getEl('icon-pause').style.display = 'block';
                getEl('icon-play').style.display = 'none';
                pauseBtn.dataset.paused = "false";
            }
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            getEl('ar-label').style.display = 'flex';
            getEl('action-toggle').onclick = () => mv.activateAR();
        } else {
            getEl('fs-icon').style.display = 'block';
            getEl('action-toggle').onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        }
    </script>
